<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K-Sign Login</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="login-page">
    <div class="overlay"></div>

    <div class="container">
      <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-11 col-sm-10 col-md-8 col-lg-5">
          <div class="login-card">
            <h1 class="login-title">Login</h1>

            <form id="loginForm">
            <div class="input-box mb-4">
                <input type="text" id="loginIdentifier" placeholder="Username or Email" required />
                <i class="fa-solid fa-user"></i>
            </div>

            <div class="input-box mb-3">
                <input type="password" id="loginPassword" placeholder="Password" required />
                <i class="fa-solid fa-lock"></i>
            </div>

            <div class="options-row mb-4">
                <label class="remember-me">
                <input type="checkbox" />
                <span>Remember me</span>
                </label>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="login-btn">Login</button>
            <p id="loginMessage" class="message-text mt-3"></p>
            </form>

              <p class="register-text mt-4 mb-0">
                Don’t have an account?
                <a href="register.html">Register</a>
              </p>

              <p id="loginMessage" class="message-text mt-3"></p>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
