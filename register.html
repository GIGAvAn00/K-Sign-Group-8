<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K-Sign Register</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="register-page">
    <div class="overlay"></div>

    <div class="container">
      <div class="row justify-content-center align-items-center min-vh-100 py-4">
        <div class="col-12 col-lg-10">
          <div class="register-card">
            <div class="row g-0 align-items-stretch">

              <!-- LEFT SIDE FORM -->
              <div class="col-lg-7">
                <div class="register-form-side">
                  <h1 class="register-title">Register</h1>
                  <p class="register-subtitle">Create your K-Sign account</p>

                  <form id="registerForm">
                    <div class="row">
                      <div class="col-md-6 mb-3">
                        <div class="input-box">
                          <input type="text" id="firstName" placeholder="First Name" required />
                          <i class="fa-solid fa-user"></i>
                        </div>
                      </div>

                      <div class="col-md-6 mb-3">
                        <div class="input-box">
                          <input type="text" id="lastName" placeholder="Last Name" required />
                          <i class="fa-solid fa-user"></i>
                        </div>
                      </div>
                    </div>

                    <div class="mb-3">
                      <div class="input-box">
                        <input type="email" id="email" placeholder="Email Address" required />
                        <i class="fa-solid fa-envelope"></i>
                      </div>
                    </div>

                    <div class="mb-3">
                      <div class="input-box">
                        <input type="text" id="username" placeholder="Username" required />
                        <i class="fa-solid fa-circle-user"></i>
                      </div>
                    </div>

                    <div class="mb-3">
                      <div class="input-box">
                        <input type="password" id="password" placeholder="Password" required />
                        <i class="fa-solid fa-lock"></i>
                      </div>
                    </div>

                    <div class="mb-3">
                      <div class="input-box">
                        <input type="password" id="confirmPassword" placeholder="Confirm Password" required />
                        <i class="fa-solid fa-lock"></i>
                      </div>
                    </div>

                    <button type="submit" class="register-btn">Register</button>

                    <p class="login-text mt-4 mb-0">
                      Already have an account?
                      <a href="login.html">Login</a>
                    </p>

                    <p id="registerMessage" class="message-text mt-3"></p>
                  </form>
                </div>
              </div>

              <!-- RIGHT SIDE WELCOME -->
              <div class="col-lg-5">
                <div class="welcome-side">
                  <div class="welcome-content">
                    <h2>Welcome to</h2>
                    <h1>K-Sign</h1>
                    <p>
                      Join the ultimate event registration system for K-pop fans.
                      Create your account and be part of exciting fan gatherings,
                      concerts, sign-up events, and unforgettable moments.
                    </p>
                    <a href="login.html" class="welcome-login-btn">Go to Login</a>
                  </div>
                </div>
              </div>

            </div>
          </div>    
        </div>
      </div>
    </div>
  </div>

  <script src="js/register.js"></script>
</body>
</html>
